services:
  server:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    container_name: sfs-server
    restart: unless-stopped
    ports:
      - "443:8443"
    environment:
      LISTEN_HOST: 0.0.0.0
      LISTEN_PORT: 8443
      DB_PATH: /app/data/sfs.db
      TLS_CERT_FILE: /run/secrets/tls_cert
      TLS_KEY_FILE: /run/secrets/tls_key
      STORAGE_ROOT: /app/storage
    secrets:
      - tls_cert
      - tls_key
    volumes:
      - ./storage/sfs_storage:/app/storage
      - ./storage/sqlite_data:/app/data

secrets:
  tls_cert:
    file: ./secrets/server-cert.pem
  tls_key:
    file: ./secrets/server-key.pem
